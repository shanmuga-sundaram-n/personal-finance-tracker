  # ===== Transactions =====
  /api/v1/transactions:
    get:
      tags: [Transactions]
      summary: List transactions with optional filters
      description: Returns a paginated list of transactions. Supports filtering by account, category, type, date range, and amount range.
      parameters:
        - name: accountId
          in: query
          required: false
          description: Filter by account ID
          schema:
            type: integer
            format: int64
            example: 1
        - name: categoryId
          in: query
          required: false
          description: Filter by category ID
          schema:
            type: integer
            format: int64
            example: 3
        - name: type
          in: query
          required: false
          description: "Filter by transaction type: INCOME, EXPENSE, or TRANSFER"
          schema:
            type: string
            example: EXPENSE
        - name: from
          in: query
          required: false
          description: Start date filter (inclusive), format yyyy-MM-dd
          schema:
            type: string
            format: date
            example: "2025-01-01"
        - name: to
          in: query
          required: false
          description: End date filter (inclusive), format yyyy-MM-dd
          schema:
            type: string
            format: date
            example: "2025-12-31"
        - name: minAmount
          in: query
          required: false
          description: Minimum absolute amount filter
          schema:
            type: number
            example: 10.00
        - name: maxAmount
          in: query
          required: false
          description: Maximum absolute amount filter
          schema:
            type: number
            example: 500.00
        - name: page
          in: query
          required: false
          description: Zero-based page number
          schema:
            type: integer
            default: 0
            example: 0
        - name: size
          in: query
          required: false
          description: Page size (capped at server maximum)
          schema:
            type: integer
            example: 30
      responses:
        "200":
          description: Paginated transaction list
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PageResponseDto'
        "401":
          description: Missing or invalid bearer token
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponseDto'
    post:
      tags: [Transactions]
      summary: Create a transaction
      description: Records a new INCOME or EXPENSE transaction. For transfers between accounts, use POST /api/v1/transfers instead.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateTransactionRequestDto'
      responses:
        "201":
          description: Transaction created — Location header contains the resource URI
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TransactionResponseDto'
        "400":
          description: Validation failed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponseDto'
        "401":
          description: Missing or invalid bearer token
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponseDto'
        "404":
          description: Account or category not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponseDto'
        "422":
          description: Business rule violation — type mismatch with category
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponseDto'

  /api/v1/transactions/transfers:
    post:
      tags: [Transactions]
      summary: Create a transfer (deprecated)
      description: "Deprecated. Use POST /api/v1/transfers instead."
      deprecated: true
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateTransferRequestDto'
      responses:
        "201":
          description: Transfer created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TransferResultResponseDto'
        "400":
          description: Validation failed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponseDto'
        "401":
          description: Missing or invalid bearer token
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponseDto'
        "404":
          description: Source or destination account not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponseDto'

  /api/v1/transactions/{id}:
    get:
      tags: [Transactions]
      summary: Get a transaction by ID
      description: Returns a single transaction. Returns 404 if it does not exist or belongs to a different user.
      parameters:
        - name: id
          in: path
          required: true
          description: Transaction ID
          schema:
            type: integer
            format: int64
            example: 42
      responses:
        "200":
          description: Transaction found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TransactionResponseDto'
        "401":
          description: Missing or invalid bearer token
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponseDto'
        "404":
          description: Transaction not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponseDto'
    put:
      tags: [Transactions]
      summary: Update a transaction
      description: Updates editable fields of a transaction. The account and transaction type are immutable.
      parameters:
        - name: id
          in: path
          required: true
          description: Transaction ID
          schema:
            type: integer
            format: int64
            example: 42
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateTransactionRequestDto'
      responses:
        "200":
          description: Transaction updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TransactionResponseDto'
        "400":
          description: Validation failed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponseDto'
        "401":
          description: Missing or invalid bearer token
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponseDto'
        "404":
          description: Transaction or category not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponseDto'
    delete:
      tags: [Transactions]
      summary: Delete a transaction
      description: Permanently deletes a single transaction and reverses its effect on the account balance.
      parameters:
        - name: id
          in: path
          required: true
          description: Transaction ID
          schema:
            type: integer
            format: int64
            example: 42
      responses:
        "204":
          description: Transaction deleted — no content returned
        "401":
          description: Missing or invalid bearer token
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponseDto'
        "404":
          description: Transaction not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponseDto'

  /api/v1/transactions/{id}/reconcile:
    patch:
      tags: [Transactions]
      summary: Mark a transaction as reconciled or unreconciled
      description: Toggles the reconciled flag on a transaction.
      parameters:
        - name: id
          in: path
          required: true
          description: Transaction ID
          schema:
            type: integer
            format: int64
            example: 42
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ReconcileTransactionRequestDto'
      responses:
        "200":
          description: Reconciliation status updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TransactionResponseDto'
        "401":
          description: Missing or invalid bearer token
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponseDto'
        "404":
          description: Transaction not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponseDto'

  # ===== Transfers =====
  /api/v1/transfers:
    post:
      tags: [Transfers]
      summary: Create a transfer between two accounts
      description: Atomically creates a debit transaction on the source account and a credit transaction on the destination account.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateTransferRequestDto'
      responses:
        "201":
          description: Transfer created — Location header points to the outbound transaction
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TransferResultResponseDto'
        "400":
          description: Validation failed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponseDto'
        "401":
          description: Missing or invalid bearer token
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponseDto'
        "404":
          description: Source or destination account not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponseDto'
        "422":
          description: Business rule violation — source and destination accounts are the same
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponseDto'

  /api/v1/transfers/{id}:
    delete:
      tags: [Transfers]
      summary: Delete both legs of a transfer
      description: Permanently deletes both the outbound and inbound transactions that form a transfer pair. Supply the outbound transaction ID.
      parameters:
        - name: id
          in: path
          required: true
          description: Outbound transaction ID of the transfer pair
          schema:
            type: integer
            format: int64
            example: 7
      responses:
        "204":
          description: Both transfer legs deleted — no content returned
        "401":
          description: Missing or invalid bearer token
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponseDto'
        "404":
          description: Transfer not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponseDto'

