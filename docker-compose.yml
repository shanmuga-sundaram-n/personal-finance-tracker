services:
  database:
    image: postgres:15.2
    container_name: finance-tracker-db
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: pft-app-user
      POSTGRES_PASSWORD: pft-app-user-secret
      POSTGRES_DB: personal-finance-tracker
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U pft-app-user -d personal-finance-tracker"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: finance-tracker-backend
    ports:
      - "8080:8080"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://database:5432/personal-finance-tracker
      SPRING_DATASOURCE_USERNAME: pft-app-user
      SPRING_DATASOURCE_PASSWORD: pft-app-user-secret
      APP_CORS_ALLOWED_ORIGINS: http://localhost:3000
    depends_on:
      database:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: finance-tracker-frontend
    ports:
      - "3000:80"
    depends_on:
      - backend

volumes:
  pgdata:
