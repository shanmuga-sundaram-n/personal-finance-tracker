name: CD

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      environment:
        description: "Deployment environment"
        required: true
        default: production
        type: choice
        options: [production, staging]

concurrency:
  group: cd-${{ github.ref }}
  cancel-in-progress: false   # never cancel a deploy mid-flight

env:
  REGISTRY: ghcr.io
  BACKEND_IMAGE: ghcr.io/${{ github.repository_owner }}/pft-backend
  FRONTEND_IMAGE: ghcr.io/${{ github.repository_owner }}/pft-frontend
  JAVA_VERSION: "21"
  NODE_VERSION: "20"

jobs:
  # ─────────────────────────────────────────────
  # 1. Run full CI gate before any publish
  # ─────────────────────────────────────────────
  ci-gate:
    name: CI Gate
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: temurin
          cache: gradle

      - name: Grant execute permission to gradlew
        run: chmod +x gradlew

      - name: Backend tests
        run: ./gradlew :application:test --no-daemon --parallel

      - name: Set up Node ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Frontend install & lint & build
        working-directory: frontend
        run: |
          npm ci
          npm run lint
          npm run build

  # ─────────────────────────────────────────────
  # 2. Build & push Docker images to GHCR
  # ─────────────────────────────────────────────
  publish:
    name: Publish Docker Images
    runs-on: ubuntu-latest
    needs: ci-gate

    permissions:
      contents: read
      packages: write

    outputs:
      image-tag: ${{ steps.meta.outputs.version }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # ── Shared image metadata ──
      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: |
            ${{ env.BACKEND_IMAGE }}
            ${{ env.FRONTEND_IMAGE }}
          tags: |
            type=sha,prefix=sha-,format=short
            type=raw,value=latest,enable={{is_default_branch}}

      # ── Backend image ──
      - name: Build and push backend image
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: |
            ${{ env.BACKEND_IMAGE }}:sha-${{ github.sha }}
            ${{ env.BACKEND_IMAGE }}:latest
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=backend
          cache-to: type=gha,mode=max,scope=backend
          provenance: false

      # ── Frontend image ──
      - name: Build and push frontend image
        uses: docker/build-push-action@v7
        with:
          context: ./frontend
          file: ./frontend/Dockerfile
          push: true
          tags: |
            ${{ env.FRONTEND_IMAGE }}:sha-${{ github.sha }}
            ${{ env.FRONTEND_IMAGE }}:latest
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=frontend
          cache-to: type=gha,mode=max,scope=frontend
          provenance: false

  # ─────────────────────────────────────────────
  # 3. Security scan published images
  # ─────────────────────────────────────────────
  security-scan:
    name: Security Scan Published Images
    runs-on: ubuntu-latest
    needs: publish

    permissions:
      contents: read
      packages: read
      security-events: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Trivy scan — backend
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ env.BACKEND_IMAGE }}:sha-${{ github.sha }}
          format: sarif
          output: trivy-backend.sarif
          severity: CRITICAL,HIGH
          exit-code: "0"

      - name: Upload backend SARIF
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: trivy-backend.sarif
          category: trivy-backend-cd

      - name: Trivy scan — frontend
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ env.FRONTEND_IMAGE }}:sha-${{ github.sha }}
          format: sarif
          output: trivy-frontend.sarif
          severity: CRITICAL,HIGH
          exit-code: "0"

      - name: Upload frontend SARIF
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: trivy-frontend.sarif
          category: trivy-frontend-cd

  # ─────────────────────────────────────────────
  # 4. Create GitHub Release on main push
  # ─────────────────────────────────────────────
  release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: [publish, security-scan]

    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Generate release notes
        id: notes
        run: |
          SHORT_SHA=$(echo "${{ github.sha }}" | cut -c1-7)
          echo "tag=release-${SHORT_SHA}" >> $GITHUB_OUTPUT
          echo "## Release ${SHORT_SHA}" > release-notes.md
          echo "" >> release-notes.md
          echo "**Commit:** \`${{ github.sha }}\`" >> release-notes.md
          echo "**Branch:** \`${{ github.ref_name }}\`" >> release-notes.md
          echo "" >> release-notes.md
          echo "### Docker Images" >> release-notes.md
          echo "- \`${{ env.BACKEND_IMAGE }}:sha-${{ github.sha }}\`" >> release-notes.md
          echo "- \`${{ env.FRONTEND_IMAGE }}:sha-${{ github.sha }}\`" >> release-notes.md
          echo "" >> release-notes.md
          echo "### Changes" >> release-notes.md
          git log --oneline --no-merges -10 >> release-notes.md

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.notes.outputs.tag }}
          name: Release ${{ steps.notes.outputs.tag }}
          body_path: release-notes.md
          draft: false
          prerelease: false
